name: ci

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    name: rust-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-cache

      - name: Install System Dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            git \
            meson \
            ninja-build \
            valac \
            gobject-introspection \
            libgirepository1.0-dev \
            libgtk-4-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libwayland-dev \
            wayland-protocols

          if ! pkg-config --exists gtk4-layer-shell-0; then
            git clone --depth 1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
            meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell
            meson compile -C /tmp/gtk4-layer-shell/build
            sudo meson install -C /tmp/gtk4-layer-shell/build
            sudo ldconfig
          fi

      - name: Cargo Fmt
        run: cargo fmt --all --check

      - name: Cargo Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo Check
        run: cargo check --workspace

      - name: Cargo Test
        run: cargo test --workspace

  release-build:
    name: release-build
    runs-on: ubuntu-latest
    needs: rust-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-cache

      - name: Install System Dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            git \
            meson \
            ninja-build \
            valac \
            gobject-introspection \
            libgirepository1.0-dev \
            libgtk-4-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libwayland-dev \
            wayland-protocols

          if ! pkg-config --exists gtk4-layer-shell-0; then
            git clone --depth 1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
            meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell
            meson compile -C /tmp/gtk4-layer-shell/build
            sudo meson install -C /tmp/gtk4-layer-shell/build
            sudo ldconfig
          fi

      - name: Cargo Build Release
        run: cargo build --release --workspace
